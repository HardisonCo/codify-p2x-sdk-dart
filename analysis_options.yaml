# Strict lint configuration.
# Built on very_good_analysis (which itself builds on flutter_lints + extras).

include: package:very_good_analysis/analysis_options.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Generated freezed + json_serializable files (will live alongside source as *.freezed.dart / *.g.dart)
    # are exempt from lint complaints — they're machine output.
    invalid_annotation_target: ignore
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "build/**"
    - "example/build/**"

linter:
  rules:
    # Inherit very_good_analysis's strict set.
    # Override sparingly — every override needs a justification in this file.

    # We use `Future<void>.unawaited()` in cleanup paths intentionally — but
    # require the explicit unawaited() form rather than discarding silently.
    unawaited_futures: true

    # Public API surface is freezed-classes + service-classes; we document each
    # member with /// comments — fail the build if we drop one.
    public_member_api_docs: true

    # Allow `print()` only in `tool/` scripts (not in lib/ or test/).
    # very_good_analysis already disallows it; nothing to override here.
