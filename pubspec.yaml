name: ycaas_flutter_sdk
description: >-
  YCaaS Flutter SDK — Dart/Flutter client for the YCaaS / P2X API at
  api.project20x.com. Companion of the TypeScript wizard-api-client.
  Consumed by NIO, IBD, PHM and other YCaaS subproject Flutter apps.
version: 0.4.0-alpha.2
repository: https://github.com/HardisonCo/ycaas-flutter-sdk
issue_tracker: https://github.com/HardisonCo/ycaas-flutter-sdk/issues
homepage: https://ycaas.ai
topics:
  - api
  - sdk
  - ycaas
  - p2x
  - rest-client

environment:
  sdk: ^3.5.0
  flutter: ">=3.16.0"

dependencies:
  # HTTP — interceptors, cancellation, multipart, retry hooks
  dio: ^5.7.0
  flutter:
    sdk: flutter
  # Storage — Sanctum bearer tokens (Keychain on iOS, EncryptedSharedPreferences
  # on Android). The ONLY persistence primitive the SDK ships: keeping it the
  # sole store prevents a future plaintext-prefs token leak (security parity).
  flutter_secure_storage: ^9.2.4
  # Meta annotations (immutable, sealed, etc.)
  meta: ^1.15.0
  # UUIDs for Idempotency-Key generation
  uuid: ^4.5.1

dev_dependencies:
  # Coverage tooling (the actual lcov binary is system-installed; this lets `dart test` emit lcov)
  coverage: ^1.9.2
  flutter_test:
    sdk: flutter
  # Lints — strict + Very Good's extra rules
  flutter_lints: ^5.0.0
  # HTTP mocking for dio (msw equivalent)
  http_mock_adapter: ^0.6.1
  # General mocking
  mocktail: ^1.0.4
  very_good_analysis: ^6.0.0
  # NOTE: When Tier 2 codegen lands (freezed unions, json_serializable
  # for OpenAPI-generated models), add back: build_runner, freezed,
  # freezed_annotation, json_annotation, json_serializable. Tracked in
  # ../P2X/FLUTTER_SDK_PLAN.md.

# Optional peer dependency: real-time WebSocket support.
# Consumers that need realtime add this themselves; the SDK ships a thin wrapper
# in lib/src/realtime/ that imports lazily so apps that don't need realtime
# don't pay the size cost.
# pusher_channels_flutter: ^2.4.0   # ADD IN CONSUMER pubspec if using RealtimeClient
